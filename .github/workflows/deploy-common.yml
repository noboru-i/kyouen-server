name: Deploy Common Workflow

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: 'Environment to deploy to (dev or prod)'
      project_id:
        required: true
        type: string
        description: 'Google Cloud Project ID'
    secrets:
      wif_provider:
        required: true
        description: 'Workload Identity Provider'
      wif_service_account:
        required: true
        description: 'Workload Identity Service Account'

env:
  SERVICE_NAME: kyouen-server
  NOTIFY_JOB_NAME: kyouen-notify
  REGION: asia-northeast1

jobs:
  deploy:
    name: Deploy to Cloud Run (${{ inputs.environment }})
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v3
      with:
        workload_identity_provider: ${{ secrets.wif_provider }}
        service_account: ${{ secrets.wif_service_account }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v3

    - name: Configure Docker for Artifact Registry
      run: gcloud auth configure-docker asia-northeast1-docker.pkg.dev

    - name: Build and push Docker image
      run: |
        docker build -t asia-northeast1-docker.pkg.dev/${{ inputs.project_id }}/kyouen-repo/${{ env.SERVICE_NAME }}:${{ github.sha }} .
        docker push asia-northeast1-docker.pkg.dev/${{ inputs.project_id }}/kyouen-repo/${{ env.SERVICE_NAME }}:${{ github.sha }}

    - name: Deploy to Cloud Run
      run: |
        SERVICE_NAME_WITH_ENV="${{ env.SERVICE_NAME }}-${{ inputs.environment }}"
        
        gcloud run deploy $SERVICE_NAME_WITH_ENV \
          --image asia-northeast1-docker.pkg.dev/${{ inputs.project_id }}/kyouen-repo/${{ env.SERVICE_NAME }}:${{ github.sha }} \
          --region ${{ env.REGION }} \
          --platform managed \
          --allow-unauthenticated \
          --port 8080 \
          --set-env-vars GOOGLE_CLOUD_PROJECT=${{ inputs.project_id }},ENVIRONMENT=${{ inputs.environment }} \
          --memory 512Mi \
          --cpu 1 \
          --max-instances 10

    - name: Get service URL and test deployment
      run: |
        SERVICE_NAME_WITH_ENV="${{ env.SERVICE_NAME }}-${{ inputs.environment }}"

        SERVICE_URL=$(gcloud run services describe $SERVICE_NAME_WITH_ENV --region=${{ env.REGION }} --format="value(status.url)")
        echo "Service URL: $SERVICE_URL"

        # Health check
        curl -f $SERVICE_URL/health || exit 1
        echo "✅ Deployment to ${{ inputs.environment }} environment successful and health check passed"
        echo "🔗 Service URL: $SERVICE_URL"

    - name: Build and push Docker image for notify
      run: |
        docker build -f Dockerfile.notify \
          -t asia-northeast1-docker.pkg.dev/${{ inputs.project_id }}/kyouen-repo/${{ env.NOTIFY_JOB_NAME }}:${{ github.sha }} .
        docker push asia-northeast1-docker.pkg.dev/${{ inputs.project_id }}/kyouen-repo/${{ env.NOTIFY_JOB_NAME }}:${{ github.sha }}

    - name: Deploy Notify Job to Cloud Run
      run: |
        NOTIFY_JOB_NAME_WITH_ENV="${{ env.NOTIFY_JOB_NAME }}-${{ inputs.environment }}"
        gcloud run jobs replace <(cat <<EOF
        apiVersion: run.googleapis.com/v1
        kind: Job
        metadata:
          name: ${NOTIFY_JOB_NAME_WITH_ENV}
          namespace: '${{ inputs.project_id }}'
        spec:
          template:
            spec:
              parallelism: 1
              template:
                spec:
                  containers:
                  - image: asia-northeast1-docker.pkg.dev/${{ inputs.project_id }}/kyouen-repo/${{ env.NOTIFY_JOB_NAME }}:${{ github.sha }}
                    env:
                    - name: GOOGLE_CLOUD_PROJECT
                      value: '${{ inputs.project_id }}'
                    - name: ENVIRONMENT
                      value: '${{ inputs.environment }}'
                    resources:
                      limits:
                        memory: 512Mi
                        cpu: 1000m
        EOF
        ) --region=${{ env.REGION }}

    - name: Create or update Cloud Scheduler job for notify
      run: |
        NOTIFY_JOB_NAME_WITH_ENV="${{ env.NOTIFY_JOB_NAME }}-${{ inputs.environment }}"
        SCHEDULER_NAME="kyouen-notify-scheduler-${{ inputs.environment }}"
        JOB_URI="https://run.googleapis.com/v2/projects/${{ inputs.project_id }}/locations/${{ env.REGION }}/jobs/${NOTIFY_JOB_NAME_WITH_ENV}:run"
        SA_EMAIL=$(gcloud auth list --filter=status:ACTIVE --format="value(account)")

        if gcloud scheduler jobs describe ${SCHEDULER_NAME} \
          --location=${{ env.REGION }} \
          --project=${{ inputs.project_id }} > /dev/null 2>&1; then
          gcloud scheduler jobs update http ${SCHEDULER_NAME} \
            --location=${{ env.REGION }} \
            --schedule="0 23 * * *" \
            --time-zone="UTC" \
            --uri="${JOB_URI}" \
            --message-body="{}" \
            --oauth-service-account-email="${SA_EMAIL}" \
            --headers="Content-Type=application/json" \
            --project=${{ inputs.project_id }}
        else
          gcloud scheduler jobs create http ${SCHEDULER_NAME} \
            --location=${{ env.REGION }} \
            --schedule="0 23 * * *" \
            --time-zone="UTC" \
            --uri="${JOB_URI}" \
            --message-body="{}" \
            --oauth-service-account-email="${SA_EMAIL}" \
            --headers="Content-Type=application/json" \
            --project=${{ inputs.project_id }}
        fi
